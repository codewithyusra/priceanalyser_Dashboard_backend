name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Use Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'

    - name: Install Server Dependencies
      run: |
        cd server
        npm install

    - name: Install Client Dependencies
      run: |
        cd client
        npm install

    - name: Lint Server
      run: |
        cd server
        # npm run lint (if exists, or just check syntax)
        node --check index.js

    - name: Build Client
      run: |
        cd client
        # npm run build
